name: Build and Release

on:
  push:
    tags: ["*"]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: ".python-version"

      - name: Build with PyInstaller
        run: |
          uv sync
          uv run pyinstaller --clean sit_stand_reminder.spec

      - name: Rename binary with platform suffix
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/sit_stand_reminder.exe dist/sit-stand-reminder-windows.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv dist/sit_stand_reminder dist/sit-stand-reminder-macos
          else
            mv dist/sit_stand_reminder dist/sit-stand-reminder-linux
          fi

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "name=sit-stand-reminder-windows" >> $GITHUB_OUTPUT
            echo "binary=dist/sit-stand-reminder-windows.exe" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "name=sit-stand-reminder-macos" >> $GITHUB_OUTPUT
            echo "binary=dist/sit-stand-reminder-macos" >> $GITHUB_OUTPUT
          else
            echo "name=sit-stand-reminder-linux" >> $GITHUB_OUTPUT
            echo "binary=dist/sit-stand-reminder-linux" >> $GITHUB_OUTPUT
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.binary }}

  stable-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sit-stand-reminder-*
          path: dist-artifacts
          merge-multiple: true

      - name: Get tag version
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "${{ env.TAG_NAME }}"
          body: "Release ${{ env.TAG_NAME }} of Sit-Stand-Reminder."
          files: |
            dist-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  beta-release:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sit-stand-reminder-*
          path: dist-artifacts
          merge-multiple: true

      - name: Create beta pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove old beta tag and release
          gh release delete beta --yes 2>/dev/null || true
          git push origin --delete beta 2>/dev/null || true

          # Create new beta tag at merge commit and push
          git tag -f beta
          git push origin beta --force

          # Create pre-release
          gh release create beta dist-artifacts/* \
            --prerelease \
            --title "Beta (PR #$PR_NUMBER)" \
            --notes "Pre-release build from PR [#$PR_NUMBER](${{ github.event.pull_request.html_url }})." \
            --target "${{ github.sha }}"
